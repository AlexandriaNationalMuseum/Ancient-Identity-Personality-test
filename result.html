<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Personality Result | Ancient Identity</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="result.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinema+Decorative:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="result-page">
        
        <!-- Language Selector - Top Right -->
        <div class="language-selector-container">
            <select id="languageSelect" class="language-select">
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
        </div>

        <!-- Top Section: Character Image Card -->
        <div class="image-card">
            <div class="image-wrapper">
                <img src="" alt="Character" class="character-image" id="charImage">
            </div>
        </div>

        <!-- Middle Section: Text content -->
        <div class="text-card">
            <div class="crown-icon">⚜️</div>
            <h1 data-translate="yourIdentityIs">Your Ancient Identity Is</h1>
            <div class="character-name" id="charName"></div>
            <div class="character-desc" id="charDesc"></div>
        </div>

        <!-- Bottom Section: Buttons -->
        <div class="buttons-card">
            <div class="buttons-container">
                <button class="restart-btn" id="restartBtn" data-translate="retakeTest">🔄 Retake Test</button>
                <button class="share-btn" id="shareBtn" data-translate="shareResult">📤 Share Result</button>
            </div>
        </div>

    </div>

    <script src="translations.js"></script>
    <script src="result.js"></script>
</body>

</html>
