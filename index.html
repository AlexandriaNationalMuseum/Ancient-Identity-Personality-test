<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ancient Identity | Discover Your Ancient Personality</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style-landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinema+Decorative:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Language Selector - Top Right -->
        <div class="language-selector-container">
            <select id="languageSelect" class="language-select">
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
        </div>

        <div class="hero-overlay"></div>
        
        <!-- Logo Section -->
        <div class="logo-container">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Ancient Identity Logo" class="site-logo" id="siteLogo">
            </div>
            <div class="museum-text">
                <p>Alexandria National Museum</p>
            </div>
        </div>
        
        <div class="hero-content">
            <div class="hero-tagline" data-translate="discoverYourTag">DISCOVER YOUR</div>
            <h1 class="hero-title">
                <span data-translate="ancient">ANCIENT</span><br>
                <span class="highlight" data-translate="identity">IDENTITY</span><br>
            </h1>
            <p class="hero-subtitle" data-translate="subtitle">
                A personality journey through the greatest<br>
                civilizations in history.
            </p>
            <button class="start-journey-btn" id="startJourneyBtn">
                <span data-translate="start">START</span> <span class="arrow">→</span>
            </button>
        </div>
        
        <div class="civ-wrapper">
            <div class="civ-container">
                <div class="civ-card" data-civ="egyptian">
                    <div class="civ-icon">𓋹</div>
                    <h3 data-translate="egyptian">EGYPTIAN</h3>
                    <div class="civ-glow"></div>
                </div>
                <div class="civ-card" data-civ="greco">
                    <div class="civ-icon">⚡</div>
                    <h3 data-translate="grecoRoman">GRECO-ROMAN</h3>
                    <div class="civ-glow"></div>
                </div>
                <div class="civ-card" data-civ="islamic">
                    <div class="civ-icon">✧</div>
                    <h3 data-translate="islamicGolden">ISLAMIC GOLDEN AGE</h3>
                    <div class="civ-glow"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="translations.js"></script>
    <script src="script-landing.js"></script>
</body>

</html>
